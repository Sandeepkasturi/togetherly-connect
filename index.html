<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Togetherly Arena — Prove it. Get placed.</title>

  <!-- ── App identity ── -->
  <meta name="description" content="Skill challenges and technical interviews — prove your skills, get placed. By SKAV TECH." />
  <meta name="author" content="SKAV TECH" />
  <meta name="application-name" content="Togetherly Arena" />
  <meta name="keywords" content="skill challenge, technical interview, coding assessment, togetherly arena, skav tech, get placed" />

  <!-- ── Cache Busting ── -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- ── Theme ── -->
  <meta name="theme-color" content="#080B0F" />
  <meta name="color-scheme" content="dark" />

  <!-- ── Icons ── -->
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- ── Open Graph ── -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Togetherly Arena — Prove it. Get placed." />
  <meta property="og:description" content="Skill challenges and technical interviews — prove your skills, get placed." />
  <meta property="og:site_name" content="Togetherly Arena" />

  <!-- ── Twitter ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Togetherly Arena — Prove it. Get placed." />
  <meta name="twitter:description" content="Skill challenges and technical interviews by SKAV TECH" />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="canonical" href="https://arena.togetherly.app/" />
</head>
<body>
  <div id="root"></div>

  <!-- Boot fallback -->
  <div id="boot-fallback" style="position:fixed;inset:0;background:#080B0F;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#F0EDE8;font-family:'DM Sans',sans-serif;z-index:9999;transition:opacity 0.5s;pointer-events:none;">
    <div style="width:24px;height:24px;border:2px solid rgba(232,255,71,0.15);border-top-color:#E8FF47;border-radius:50%;animation:boot-spin 1s linear infinite;"></div>
    <p style="margin-top:20px;font-size:11px;opacity:0.5;letter-spacing:1px;text-transform:uppercase;" id="boot-fallback-status">Loading Arena...</p>
    <style>
      @keyframes boot-spin { to { transform: rotate(360deg) } }
      #root:not(:empty)+#boot-fallback { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
  </div>

  <script>
    window.dismissFallback = function() {
      var fb = document.getElementById('boot-fallback');
      if (fb) { fb.style.opacity = '0'; setTimeout(function() { fb.remove(); }, 500); }
    };
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
