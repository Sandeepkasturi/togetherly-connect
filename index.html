<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <script>
    // CRITICAL: Polyfill Node globals as early as possible
    window.global = window;
    window.process = { env: { NODE_ENV: 'production' } };
  </script>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Togetherly — Watch. Connect. Together.</title>

  <!-- ── App identity ── -->
  <meta name="description" content="Real-time peer-to-peer watch parties, calls, and screen sharing — by SKAV TECH" />
  <meta name="author" content="SKAV TECH" />
  <meta name="application-name" content="Togetherly" />
  <meta name="keywords" content="watch party, screen share, peer to peer, video call, togetherly, skav tech" />

  <!-- ── PWA / Theme ── -->
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />


  <!-- ── Icons ── -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- ── Open Graph ── -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Togetherly — Watch. Connect. Together." />
  <meta property="og:description" content="Real-time peer-to-peer watch parties, calls, and screen sharing" />
  <meta property="og:url" content="https://togetherly-share.vercel.app/" />
  <meta property="og:image" content="https://togetherly-share.vercel.app/icons/icon-512x512.png" />
  <meta property="og:site_name" content="Togetherly" />

  <!-- ── Twitter ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Togetherly — Watch. Connect. Together." />
  <meta name="twitter:description"
    content="Real-time peer-to-peer watch parties, calls, and screen sharing by SKAV TECH" />
  <meta name="twitter:image" content="https://togetherly-share.vercel.app/icons/icon-512x512.png" />
  <meta name="twitter:site" content="@skavtech" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Liquid glass SVG filter — Fixed visibility for Chrome/Safari compatibility -->
  <div style="visibility: hidden; width: 0; height: 0; position: absolute; overflow: hidden;" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="liquid-glass-nav" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.65 0.65" numOctaves="2" seed="7" result="noise" />
          <feGaussianBlur in="noise" stdDeviation="1.5" result="blurred" />
          <feDisplacementMap in="SourceGraphic" in2="blurred" scale="8" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </div>

  <link rel="canonical" href="https://togetherly-share.vercel.app/" />

  <meta property="og:title" content="Togetherly" />
  <meta property="og:description" content="Peer-to-peer collaboration app" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@lovable_dev" />
</head>

<body>
  <div id="root"></div>

  <!-- Fallback Boot Screen (Moved after #root for CSS sibling selector) -->
  <div id="boot-fallback"
    style="position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;z-index:9999;transition:opacity 0.5s;pointer-events:none;">
    <div
      style="width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:#0A84FF;border-radius:50%;animation:boot-spin 1s linear infinite;">
    </div>
    <p style="margin-top:20px;font-size:11px;opacity:0.5;letter-spacing:1px;text-transform:uppercase;"
      id="boot-fallback-status">Connecting...</p>
    <style>
      @keyframes boot-spin {
        to {
          transform: rotate(360deg)
        }
      }

      #root:not(:empty)+#boot-fallback {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </div>

  <script>
    console.log("[INDEX] HTML Parsed, initializing app...");
    // Emergency manual removal called by main.tsx
    window.dismissFallback = function () {
      const fb = document.getElementById('boot-fallback');
      if (fb) {
        fb.style.opacity = '0';
        setTimeout(() => fb.remove(), 500);
      }
    };
  </script>

  <script type="module" src="/src/main.tsx"></script>

  <!-- External widgets loaded last to prevent blocking -->
  <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
    data-id="sandeepkasturi" data-description="Support me on Buy me a coffee!" data-color="#517a92"
    data-position="Right" data-x_margin="18" data-y_margin="90"></script>
</body>

</html>
